<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <form action="/usuarios/novo" method="post">
    <div class="container">
        <h1>Cadastro</h1>
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>
            
        <div class="form-group">
            <label for="role">Perfil:</label>
            <select name="role" id="role">
                <option value="operador">operador</option>
                <option value="admin">admin</option>
            </select>

            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <div style="text-align: center; margin-top: 30px;"></div>
            <a href="/usuarios/" style="display: block; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 6px; font-weight: 600;">Voltar para o menu</a>
        </div>
            {% if erro %}
            <p style="color: red;">{{ erro }}</p>
        {% endif %}

    </div>
</body>
</html>
